name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  hub:
    name: Hub typecheck and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: hub/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: hub

      - name: Typecheck
        run: npm run typecheck
        working-directory: hub

      - name: Test
        run: npm test
        working-directory: hub
